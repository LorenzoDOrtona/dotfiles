general {
    disable_loading_bar = false
    hide_cursor = true
}

background {
    monitor =
    path = /usr/share/backgrounds/archlinux/archlinux-simple.png
    blur_passes = 2
    blur_size = 7
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2

    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true

    outer_color = rgba(255, 255, 255, 0.2)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgba(255, 255, 255, 1.0)

    placeholder_text = Inserisci password...
    fade_on_empty = false
    rounding = 10

    position = 0, -20
    halign = center
    valign = center
}
